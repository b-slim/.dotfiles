# ~/.tmux.conf — deployed by deploy-dotfiles-local (local) and deploy-dotfiles (remote VMs)

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
unbind C-a
set -g prefix C-Space
bind C-Space send-prefix

# Double-press prefix to send keys to inner tmux (nested sessions on VMs)
bind-key -n C-F12 set-option -g prefix None    \;\
                  set-option -g key-table off
bind-key -T off C-F12 set-option -g prefix C-Space \;\
                       set-option -g key-table root

# ── General ───────────────────────────────────────────────────────────────────
set -sg escape-time 10          # fast escape — prevents Neovim lag inside tmux
set -g base-index 1             # windows start at 1 (not 0)
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on      # close window 2 of 3 → renumber to 2
set -g mouse on
set -g history-limit 50000
set -g focus-events on          # pass focus events to apps (Neovim autoread)
setw -g aggressive-resize on    # nested tmux: resize based on the active client
                                # (prevents status-bar redraw artifacts when
                                # switching panes in the outer tmux)

# ── Shell ─────────────────────────────────────────────────────────────────────
# Prefer zsh even when the login shell is bash (common on minimal VMs)
if-shell '[ -x /opt/homebrew/bin/zsh ]' 'set -g default-shell /opt/homebrew/bin/zsh'
if-shell '[ -x /usr/local/bin/zsh ]' 'set -g default-shell /usr/local/bin/zsh'
if-shell '[ -x /usr/bin/zsh ]' 'set -g default-shell /usr/bin/zsh'
if-shell '[ -x /bin/zsh ]' 'set -g default-shell /bin/zsh'

# ── Colors ────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# ── Splitting ─────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"    # new window in current path

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Alt+hjkl without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Pane resizing ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window switching ──────────────────────────────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ── Copy mode (vi-style) ──────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi C-v   send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
# tmux-yank plugin handles pbcopy (macOS) / xclip (Linux) automatically

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ── Plugins (via TPM) ─────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'dracula/tmux'

# ── resurrect ─────────────────────────────────────────────────────────────────
# Note: pane-content capture disabled — restoring saved pane contents can dump
# stale status-bar text into panes and cause cat errors when the restore path
# contains an empty session name (seen on VMs).
# set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '~nvim ~vim'       # restore Neovim sessions

# ── continuum ─────────────────────────────────────────────────────────────────
# Note: auto-restore disabled for the same reason as above. Sessions can still
# be saved/restored manually with Prefix+Ctrl-s / Prefix+Ctrl-r.
# set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'  # auto-save every 15 minutes

# ── dracula ───────────────────────────────────────────────────────────────────
# Minimal widget set: no shell-command widgets (like weather/network/gpu/cpu)
# that could refresh aggressively. Powerline off to avoid any width glyphs.
set -g @dracula-plugins "time"
set -g @dracula-show-powerline false
set -g @dracula-show-left-icon session
set -g @dracula-show-timezone false
set -g @dracula-military-time true
set -g @dracula-day-month true
set -g @dracula-refresh-rate 30

# ── Initialize TPM (must be the last line) ────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
