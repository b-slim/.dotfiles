# Ghostty config — deployed to ~/.config/ghostty/config
# Docs: https://ghostty.org/docs/config

# ── Font ──────────────────────────────────────────────────────────────────────
font-family = JetBrainsMono Nerd Font Mono
font-size = 14
font-thicken = true

# ── Theme ─────────────────────────────────────────────────────────────────────
theme = catppuccin-mocha

# ── Window ────────────────────────────────────────────────────────────────────
window-padding-x = 10
window-padding-y = 8
window-padding-balance = true
window-decoration = true
macos-titlebar-style = tabs
macos-titlebar-proxy-icon = hidden

# ── Shell integration ─────────────────────────────────────────────────────────
# Enables: cursor shape per mode, proper prompt marking, title updates
shell-integration = zsh

# ── Cursor ────────────────────────────────────────────────────────────────────
cursor-style = block
cursor-style-blink = false

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback-limit = 100000

# ── macOS keybindings ─────────────────────────────────────────────────────────
# Use Option as Alt (required for zsh Alt+. word navigation, fzf Alt+C, etc.)
macos-option-as-alt = true

# ── Misc ──────────────────────────────────────────────────────────────────────
copy-on-select = false
mouse-hide-while-typing = true
confirm-close-surface = false
quit-after-last-window-closed = true
